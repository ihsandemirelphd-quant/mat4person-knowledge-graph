<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Constellation — MAT4Person</title>
<meta name="description" content="Interactive knowledge graph of Turkish science — four centennial scientists and their documented world.">
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path fill="%23e9b44c" d="M12 0l2.6 9.4L24 12l-9.4 2.6L12 24l-2.6-9.4L0 12l9.4-2.6z"/></svg>'>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>
<canvas class="sky" aria-hidden="true"></canvas>

<header class="topbar">
  <a class="brand" href="index.html">
    <span class="brand-mark">✦</span>
    <span><span class="brand-name">MAT4Person</span><span class="brand-sub">Atlas of Turkish Science</span></span>
  </a>
  <div class="topbar-right">
    <nav class="nav">
      <a href="index.html">Overview</a>
      <a href="knowledge_graph.html">Constellation</a>
      <a href="id_cards.html">ID Cards</a>
      <a href="evidence_atlas.html">Evidence Atlas</a>
      <a href="model_report.html">Run Report</a>
      <a href="academic_genealogy.html">Genealogy</a>
    </nav>
    <a class="btn ghost mini" href="simple.html">Simple view</a>
    <a class="btn mini contribute-btn" data-contribute-link target="_blank" rel="noopener">+ Suggest a relation</a>
  </div>
</header>

<main class="app-shell">
  <aside class="panel left">
    <div class="panel-inner">
      <h2>Constellation</h2>
      <p class="meta" id="graphCounts"></p>

      <div class="suggest">
        <input id="search" class="field" placeholder="Search people, institutes, quotes…" autocomplete="off">
        <div id="suggest" class="suggest-list"></div>
      </div>

      <h4>Relation families</h4>
      <div class="toolbar" id="familyChips"></div>

      <h4>Confidence</h4>
      <div class="toolbar" id="confChips"></div>

      <h4>Display</h4>
      <div class="toolbar">
        <select id="labelMode" class="field" style="margin:0;flex:1">
          <option value="auto">Labels: hubs &amp; hover</option>
          <option value="all">Labels: everything</option>
          <option value="none">Labels: none</option>
        </select>
      </div>
      <div class="toolbar">
        <button id="focusBtn" class="chip" style="--c:#e9b44c"><span class="swatch"></span>Focus selection</button>
        <button id="clearBtn" class="chip">Clear</button>
      </div>

      <h4>Brightest stars</h4>
      <div id="nodeList" class="node-list"></div>
    </div>
  </aside>

  <section class="stage">
    <canvas id="graphCanvas"></canvas>
    <div id="tip" class="stage-tip"></div>
    <div class="stage-note">drag to pan · wheel to zoom · double-click a star for its ID card</div>
    <div class="legend" id="legend"></div>
    <div class="zoombar">
      <button id="zoomIn" title="Zoom in">+</button>
      <button id="zoomOut" title="Zoom out">−</button>
      <button id="zoomFit" title="Fit view">⌂</button>
    </div>
  </section>

  <aside class="panel right">
    <div id="inspector" class="panel-inner"></div>
  </aside>
</main>

<script src="assets/data.js"></script>
<script src="assets/common.js"></script>
<script src="assets/graph.js"></script>
</body>
</html>
